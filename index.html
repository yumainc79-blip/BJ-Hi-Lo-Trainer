<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#101820" />
  <meta name="description" content="PWA per allenarsi al conteggio carte Hi-Lo nel blackjack." />
  <title>BJ Hi-Lo Trainer</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="topbar topbar-compact" aria-label="Stato allenamento">
      <section class="stat-card stat-time">
        <span class="stat-label">Tempo</span>
        <strong id="timer">00:00</strong>
      </section>
      <button id="settingsToggle" class="icon-button" type="button" aria-expanded="false" aria-controls="settingsPanel">⚙︎</button>
    </header>

    <section id="settingsPanel" class="settings-panel" aria-label="Impostazioni">
      <div class="settings-grid">
        <label class="field">
          <span>Numero di mazzi</span>
          <select id="deckCount">
            <option value="1">1 mazzo</option>
            <option value="2">2 mazzi</option>
            <option value="4">4 mazzi</option>
            <option value="6" selected>6 mazzi</option>
            <option value="8">8 mazzi</option>
          </select>
        </label>

        <label class="field range-field">
          <span>Taglio / penetrazione: <strong id="cutLabel">75%</strong></span>
          <input id="cutPercent" type="range" min="50" max="90" step="5" value="75" />
        </label>

        <label class="switch-row">
          <span>
            <strong>Distribuzione automatica</strong>
            <small>Spenta: nuova carta al tap</small>
          </span>
          <input id="autoMode" type="checkbox" role="switch" />
        </label>

        <label id="speedField" class="field range-field is-hidden">
          <span>Velocità: <strong id="speedLabel">40</strong> carte/min</span>
          <input id="speed" type="range" min="10" max="120" step="5" value="40" />
        </label>
      </div>
    </section>

    <section class="shoe-progress" aria-label="Avanzamento scarpa">
      <div class="progress-copy">
        <span id="dealtInfo">0 carte distribuite</span>
        <span id="remainingInfo">Taglio a 234 carte</span>
      </div>
      <div class="progress-track"><span id="progressFill"></span></div>
    </section>

    <section class="table-area" aria-label="Area carte">
      <button id="cardButton" class="card-button" type="button" aria-label="Distribuisci una carta">
        <span id="card" class="playing-card card-back">
          <span class="card-face card-face-back">
            <span class="back-pattern">BJ</span>
          </span>
          <span class="card-face card-face-front">
            <span id="cardRankTop" class="rank top">?</span>
            <span id="cardSuit" class="suit">♠</span>
            <span id="cardRankBottom" class="rank bottom">?</span>
          </span>
        </span>
      </button>
      <p id="mainHint" class="main-hint">Tocca il dorso per girare una carta.</p>
    </section>

    <section class="controls" aria-label="Controlli">
      <button id="primaryAction" class="primary-button" type="button">Start</button>
      <button id="newShoe" class="secondary-button" type="button">Nuova scarpa</button>
    </section>

    <section class="mini-dashboard" aria-label="Statistiche sessione">
      <article>
        <span>Risposte corrette</span>
        <strong id="correctAnswers">0</strong>
      </article>
      <article>
        <span>Errori</span>
        <strong id="wrongAnswers">0</strong>
      </article>
      <article>
        <span>Accuracy</span>
        <strong id="accuracy">—</strong>
      </article>
    </section>


    <p id="appVersion" class="app-version" aria-label="Versione applicazione">Versione app: v0.003</p>

  </main>

  <dialog id="countDialog" class="count-dialog">
    <form method="dialog" id="countForm">
      <h2>Conteggio?</h2>
      <p>Inserisci il running count Hi-Lo attuale.</p>
      <input id="countInput" type="number" inputmode="numeric" autocomplete="off" aria-label="Conteggio attuale" />
      <menu>
        <button id="submitCount" class="primary-button" value="submit">Conferma</button>
      </menu>
    </form>
  </dialog>

  <dialog id="resultDialog" class="count-dialog result-dialog">
    <form method="dialog">
      <h2 id="resultTitle">Risultato</h2>
      <p id="resultMessage"></p>
      <menu>
        <button id="resultOk" class="primary-button" value="ok">Avanti</button>
      </menu>
    </form>
  </dialog>

  <script src="app.js" defer></script>
</body>
</html>
