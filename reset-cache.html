<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset cache BJ Trainer v0.007</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#0b1117;color:#f7efe2;font-family:system-ui,-apple-system,Segoe UI,sans-serif;padding:24px;text-align:center}
    main{max-width:520px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:24px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.35)}
    h1{margin:0 0 10px;font-size:1.4rem} p{color:#a9b0bb;line-height:1.45} a,button{display:inline-block;margin-top:12px;border:0;border-radius:16px;padding:14px 18px;background:#e8b86d;color:#1b1206;font-weight:800;text-decoration:none}
  </style>
</head>
<body>
  <main>
    <h1>Reset cache in corso…</h1>
    <p id="status">Sto eliminando service worker e cache vecchie.</p>
    <a id="go" href="index.html?v=0.007" hidden>Apri BJ Trainer aggiornato</a>
  </main>
  <script>
    async function resetCache(){
      const status = document.getElementById('status');
      try {
        if ('serviceWorker' in navigator) {
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(reg => reg.unregister()));
        }
        if ('caches' in window) {
          const names = await caches.keys();
          await Promise.all(names.map(name => caches.delete(name)));
        }
        status.textContent = 'Cache eliminata. Ora apro la versione aggiornata.';
        document.getElementById('go').hidden = false;
        setTimeout(() => { window.location.href = 'index.html?v=0.007'; }, 900);
      } catch (e) {
        status.textContent = 'Non sono riuscito a completare il reset automatico. Premi il pulsante qui sotto.';
        document.getElementById('go').hidden = false;
      }
    }
    resetCache();
  </script>
</body>
</html>
